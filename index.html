<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>AI 导航</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="brand">
          <div class="titleRow">
            <div class="logo" aria-hidden="true"></div>
            <h1>AI 导航</h1>
          </div>
          <p class="subtitle">
            一个纯静态的 AI 网站入口页：支持分类、搜索、快速打开。站点数据已经单独拆到 <code>sites.js</code>，你只需要改数据文件里的网址。
          </p>
        </div>

        <div class="controls">
          <div class="search" role="search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M10.5 19a8.5 8.5 0 1 1 0-17 8.5 8.5 0 0 1 0 17Z" stroke="currentColor" stroke-width="1.7"/>
              <path d="M16.5 16.5 21 21" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
            </svg>
            <input id="q" type="search" placeholder="搜索：站点名 / 关键词 / 描述（按 / 聚焦）" autocomplete="off" />
          </div>
          <button class="pill" id="toggleCompact" type="button" aria-pressed="false" title="切换紧凑布局">
            <span>紧凑</span>
          </button>
          <button class="pill" id="openFirst" type="button" title="打开第一个搜索结果（Enter 也可以）">
            <span>打开</span>
          </button>
        </div>
      </header>

      <div class="grid" id="app"></div>

      <div class="empty" id="empty">
        没有匹配的结果。你可以换个关键词，或直接修改页面里的“站点配置”。
      </div>

      <footer>
        <div>
          快捷键：<kbd>/</kbd> 聚焦搜索，<kbd>Enter</kbd> 打开第一条结果，<kbd>Esc</kbd> 清空搜索。
        </div>
        <div id="count"></div>
      </footer>
    </div>

    <script src="./sites.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
