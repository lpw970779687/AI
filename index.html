<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>AI 导航</title>
    <style>
      :root{
        --bg: #0b1020;
        --panel: rgba(255,255,255,.08);
        --panel2: rgba(255,255,255,.06);
        --text: rgba(255,255,255,.92);
        --muted: rgba(255,255,255,.68);
        --border: rgba(255,255,255,.14);
        --shadow: 0 18px 50px rgba(0,0,0,.35);
        --accent: #7c5cff;
        --accent2: #22c55e;
        --danger: #ff4d6d;
        --chip: rgba(124,92,255,.18);
        --chip2: rgba(34,197,94,.18);
        --chip3: rgba(255,77,109,.18);
        --radius: 18px;
        --radius2: 14px;
      }

      @media (prefers-color-scheme: light) {
        :root{
          --bg: #f6f7fb;
          --panel: rgba(20,24,40,.06);
          --panel2: rgba(20,24,40,.04);
          --text: rgba(12,16,28,.92);
          --muted: rgba(12,16,28,.66);
          --border: rgba(20,24,40,.12);
          --shadow: 0 18px 50px rgba(20,24,40,.14);
          --chip: rgba(124,92,255,.12);
          --chip2: rgba(34,197,94,.12);
          --chip3: rgba(255,77,109,.12);
        }
      }

      *{ box-sizing: border-box; }
      html,body{ height:100%; }
      body{
        margin:0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", Arial, "Apple Color Emoji", "Segoe UI Emoji";
        color: var(--text);
        background: var(--bg);
        overflow-x: hidden;
      }

      /* 更细腻的高级背景：光斑 + 渐变流动 + 轻微噪点（不影响可读性） */
      body::before,
      body::after{
        content:"";
        position: fixed;
        inset: -20vmax;
        z-index: -1;
        pointer-events: none;
        will-change: transform;
      }

      body::before{
        background:
          radial-gradient(900px 600px at 15% 10%, rgba(124,92,255,.40), transparent 60%),
          radial-gradient(900px 640px at 85% 18%, rgba(34,197,94,.22), transparent 62%),
          radial-gradient(900px 640px at 55% 110%, rgba(255,77,109,.18), transparent 62%),
          radial-gradient(700px 520px at 45% 45%, rgba(255,255,255,.06), transparent 62%),
          conic-gradient(from 180deg at 50% 50%,
            rgba(124,92,255,.14),
            rgba(34,197,94,.10),
            rgba(255,77,109,.10),
            rgba(124,92,255,.14)
          );
        filter: blur(22px) saturate(115%);
        opacity: .95;
        transform: translate3d(0,0,0);
        animation: bgDrift 18s ease-in-out infinite alternate;
      }

      body::after{
        /* 轻微噪点纹理：用 repeating-radial + 混合模式模拟，避免大面积纯色显廉价 */
        background:
          repeating-radial-gradient(circle at 20% 30%,
            rgba(255,255,255,.020) 0 1px,
            rgba(255,255,255,0) 1px 3px
          ),
          repeating-radial-gradient(circle at 80% 70%,
            rgba(0,0,0,.028) 0 1px,
            rgba(0,0,0,0) 1px 3px
          );
        mix-blend-mode: overlay;
        opacity: .38;
        filter: blur(.2px);
        transform: translate3d(0,0,0);
      }

      @keyframes bgDrift{
        0%   { transform: translate3d(-1.5%, -1%, 0) scale(1.02); }
        100% { transform: translate3d( 1.2%,  1.4%, 0) scale(1.05); }
      }

      a{ color: inherit; text-decoration: none; }
      .wrap{
        width:min(1120px, calc(100% - 44px));
        margin: 34px auto 56px;
      }

      header{
        display:flex;
        gap: 18px;
        align-items: flex-start;
        justify-content: space-between;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }

      .brand{
        display:flex;
        flex-direction: column;
        gap: 8px;
      }
      .titleRow{
        display:flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }
      .logo{
        width: 42px;
        height: 42px;
        border-radius: 14px;
        background:
          radial-gradient(18px 18px at 30% 30%, rgba(255,255,255,.55), transparent 60%),
          linear-gradient(135deg, rgba(124,92,255,.95), rgba(34,197,94,.75));
        box-shadow: var(--shadow);
        border: 1px solid rgba(255,255,255,.18);
      }
      h1{
        margin:0;
        font-size: 26px;
        letter-spacing: .2px;
      }
      .subtitle{
        margin:0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
        max-width: 52ch;
      }

      .controls{
        display:flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .search{
        display:flex;
        align-items:center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 999px;
        background: var(--panel);
        border: 1px solid var(--border);
        box-shadow: 0 10px 30px rgba(0,0,0,.14);
        min-width: min(520px, 72vw);
      }
      .search svg{ opacity: .85; }
      .search input{
        width: 100%;
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--text);
        font-size: 14px;
      }
      .search input::placeholder{ color: color-mix(in oklab, var(--muted) 88%, transparent); }

      .pill{
        user-select:none;
        display:inline-flex;
        gap: 8px;
        align-items:center;
        padding: 9px 12px;
        border-radius: 999px;
        background: var(--panel);
        border: 1px solid var(--border);
        color: var(--muted);
        font-size: 13px;
        cursor: pointer;
        transition: transform .12s ease, background .12s ease, border-color .12s ease;
      }
      .pill:hover{ transform: translateY(-1px); border-color: color-mix(in oklab, var(--border) 70%, var(--accent)); }
      .pill:active{ transform: translateY(0); }
      .pill[aria-pressed="true"]{
        color: var(--text);
        background: color-mix(in oklab, var(--panel) 55%, var(--accent) 18%);
        border-color: color-mix(in oklab, var(--border) 60%, var(--accent) 50%);
      }

      .grid{
        display:grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 14px;
        margin-top: 16px;
      }

      .section{
        grid-column: span 12;
        background: var(--panel2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow:hidden;
      }
      .sectionHead{
        display:flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        background: color-mix(in oklab, var(--panel2) 80%, transparent);
        border-bottom: 1px solid var(--border);
      }
      .sectionTitle{
        display:flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }
      .sectionTitle h2{
        margin:0;
        font-size: 15px;
        letter-spacing: .2px;
        white-space: nowrap;
      }
      .badge{
        display:inline-flex;
        align-items:center;
        justify-content:center;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 12px;
        color: var(--muted);
        border: 1px solid var(--border);
        background: rgba(255,255,255,.04);
      }
      .sectionActions{
        display:flex;
        gap: 8px;
        align-items: center;
      }
      .linkBtn{
        display:inline-flex;
        align-items:center;
        gap: 8px;
        padding: 9px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255,255,255,.04);
        color: var(--muted);
        font-size: 13px;
        cursor: pointer;
        transition: border-color .12s ease, transform .12s ease, background .12s ease;
      }
      .linkBtn:hover{ transform: translateY(-1px); border-color: color-mix(in oklab, var(--border) 65%, var(--accent)); }
      .linkBtn:active{ transform: translateY(0); }

      .cards{
        padding: 14px;
        display:grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 12px;
      }

      .card{
        grid-column: span 6;
        padding: 14px;
        border-radius: var(--radius2);
        background: rgba(255,255,255,.04);
        border: 1px solid var(--border);
        transition: transform .14s ease, border-color .14s ease, background .14s ease;
        display:flex;
        flex-direction: column;
        gap: 10px;
        min-height: 92px;
      }
      .card:hover{
        transform: translateY(-2px);
        border-color: color-mix(in oklab, var(--border) 55%, var(--accent) 40%);
        background: color-mix(in oklab, rgba(255,255,255,.04) 70%, var(--accent) 10%);
      }
      .cardTop{
        display:flex;
        gap: 12px;
        align-items: flex-start;
        justify-content: space-between;
      }
      .name{
        font-weight: 650;
        letter-spacing: .2px;
      }
      .desc{
        margin:0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }
      .meta{
        display:flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .chip{
        font-size: 12px;
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--muted);
        background: rgba(255,255,255,.03);
      }
      .chip.kind-cn{ background: var(--chip); color: color-mix(in oklab, var(--text) 70%, var(--accent)); border-color: color-mix(in oklab, var(--border) 60%, var(--accent)); }
      .chip.kind-global{ background: var(--chip2); color: color-mix(in oklab, var(--text) 70%, var(--accent2)); border-color: color-mix(in oklab, var(--border) 60%, var(--accent2)); }
      .chip.kind-sg{ background: var(--chip3); color: color-mix(in oklab, var(--text) 70%, var(--danger)); border-color: color-mix(in oklab, var(--border) 60%, var(--danger)); }

      .favicon{
        width: 18px; height: 18px;
        border-radius: 6px;
        background: rgba(255,255,255,.08);
        border: 1px solid var(--border);
        flex: 0 0 auto;
      }

      .row{
        display:flex;
        gap: 8px;
        align-items: center;
        min-width: 0;
      }
      .row .name{ overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

      .empty{
        padding: 16px;
        color: var(--muted);
        font-size: 13px;
        display:none;
      }

      footer{
        margin-top: 14px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.6;
        display:flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        opacity: .92;
      }
      kbd{
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 11px;
        padding: 2px 6px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: rgba(255,255,255,.05);
        color: var(--muted);
      }

      @media (max-width: 820px){
        .card{ grid-column: span 12; }
        .search{ min-width: min(520px, 100%); }
        header{ align-items: stretch; }
        .controls{ justify-content: stretch; }
      }

      @media (prefers-reduced-motion: reduce){
        *{ transition: none !important; scroll-behavior: auto !important; }
        body::before{ animation: none !important; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="brand">
          <div class="titleRow">
            <div class="logo" aria-hidden="true"></div>
            <h1>AI 导航</h1>
          </div>
          <p class="subtitle">
            一个纯静态的 AI 网站入口页：支持分类、搜索、快速打开。你只需要在下面的“站点配置”里把网址替换成你自己的（包含“国网 AI”）。
          </p>
        </div>

        <div class="controls">
          <div class="search" role="search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M10.5 19a8.5 8.5 0 1 1 0-17 8.5 8.5 0 0 1 0 17Z" stroke="currentColor" stroke-width="1.7"/>
              <path d="M16.5 16.5 21 21" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
            </svg>
            <input id="q" type="search" placeholder="搜索：站点名 / 关键词 / 描述（按 / 聚焦）" autocomplete="off" />
          </div>
          <button class="pill" id="toggleCompact" type="button" aria-pressed="false" title="切换紧凑布局">
            <span>紧凑</span>
          </button>
          <button class="pill" id="openFirst" type="button" title="打开第一个搜索结果（Enter 也可以）">
            <span>打开</span>
          </button>
        </div>
      </header>

      <div class="grid" id="app"></div>

      <div class="empty" id="empty">
        没有匹配的结果。你可以换个关键词，或直接修改页面里的“站点配置”。
      </div>

      <footer>
        <div>
          快捷键：<kbd>/</kbd> 聚焦搜索，<kbd>Enter</kbd> 打开第一条结果，<kbd>Esc</kbd> 清空搜索。
        </div>
        <div id="count"></div>
      </footer>
    </div>

    <script>
      /**
       * 站点配置（你主要改这里）
       * - kind: cn(国内) | global(国外) | sg(国网/内网/专项)
       * - tags: 用于搜索的关键词
       */
      const SITE_GROUPS = [
        {
          id: "cn",
          title: "国内 AI",
          hint: "国内常用 AI / 大模型 / 办公助手",
          kind: "cn",
          sites: [
            { name: "通义千问", url: "https://tongyi.aliyun.com/", desc: "阿里通义 - 对话/写作/代码", tags: ["阿里", "通义", "写作", "代码"] },
            { name: "文心一言", url: "https://yiyan.baidu.com/", desc: "百度文心 - 对话/创作/知识问答", tags: ["百度", "文心", "创作"] },
            { name: "Kimi", url: "https://kimi.moonshot.cn/", desc: "长文本/总结/检索与写作", tags: ["长文本", "总结", "Moonshot"] },
            { name: "智谱清言", url: "https://chatglm.cn/", desc: "GLM 系列对话与工具", tags: ["智谱", "GLM", "对话"] },
            { name: "讯飞星火", url: "https://xinghuo.xfyun.cn/", desc: "讯飞 - 写作/知识/办公", tags: ["讯飞", "星火", "办公"] },
            { name: "腾讯元宝", url: "https://yuanbao.tencent.com/", desc: "腾讯 - 对话/写作/工具", tags: ["腾讯", "元宝"] },
          ],
        },
        {
          id: "sg",
          title: "国网 AI（可自定义）",
          hint: "放你们内部/国网相关的 AI 入口（如需要内网访问）",
          kind: "sg",
          sites: [
            {
              name: "国网 AI 入口（示例）",
              url: "https://example.com/",
              desc: "把这里改成你的“国网 AI”实际网址",
              tags: ["国网", "内网", "SGCC", "专项"],
            },
          ],
        },
        {
          id: "global",
          title: "国外 AI",
          hint: "海外 AI / 工具（可能需要网络条件）",
          kind: "global",
          sites: [
            { name: "ChatGPT", url: "https://chat.openai.com/", desc: "通用对话/写作/代码", tags: ["OpenAI", "对话", "代码"] },
            { name: "Claude", url: "https://claude.ai/", desc: "写作与长文档处理强", tags: ["Anthropic", "长文档", "写作"] },
            { name: "Gemini", url: "https://gemini.google.com/", desc: "Google AI 助手", tags: ["Google", "Gemini"] },
            { name: "Perplexity", url: "https://www.perplexity.ai/", desc: "AI 搜索与问答", tags: ["搜索", "问答"] },
          ],
        },
      ];

      const $ = (sel) => document.querySelector(sel);
      const app = $("#app");
      const empty = $("#empty");
      const count = $("#count");
      const q = $("#q");
      const toggleCompact = $("#toggleCompact");
      const openFirst = $("#openFirst");

      let compact = false;
      let lastRender = { matched: 0, total: 0, firstUrl: null };

      function normalize(s) {
        return String(s ?? "").trim().toLowerCase();
      }

      function siteText(site) {
        return normalize([
          site.name,
          site.desc,
          (site.tags || []).join(" "),
          site.url,
        ].join(" "));
      }

      function kindLabel(kind) {
        if (kind === "cn") return "国内";
        if (kind === "global") return "国外";
        if (kind === "sg") return "国网";
        return "其他";
      }

      function kindChipClass(kind) {
        if (kind === "cn") return "kind-cn";
        if (kind === "global") return "kind-global";
        if (kind === "sg") return "kind-sg";
        return "";
      }

      function faviconUrl(url) {
        try {
          const u = new URL(url);
          return `${u.origin}/favicon.ico`;
        } catch {
          return "";
        }
      }

      function buildSection(group, query) {
        const sites = group.sites || [];
        const filtered = query
          ? sites.filter((s) => siteText(s).includes(query))
          : sites.slice();

        const section = document.createElement("section");
        section.className = "section";
        section.dataset.groupId = group.id;

        const head = document.createElement("div");
        head.className = "sectionHead";

        const title = document.createElement("div");
        title.className = "sectionTitle";
        title.innerHTML = `
          <h2>${escapeHtml(group.title)}</h2>
          <span class="badge" title="${escapeAttr(group.hint || "")}">${filtered.length}/${sites.length}</span>
        `;

        const actions = document.createElement("div");
        actions.className = "sectionActions";

        const collapseBtn = document.createElement("button");
        collapseBtn.type = "button";
        collapseBtn.className = "linkBtn";
        collapseBtn.textContent = "折叠/展开";

        const openAllBtn = document.createElement("button");
        openAllBtn.type = "button";
        openAllBtn.className = "linkBtn";
        openAllBtn.textContent = "全部打开";
        openAllBtn.title = "可能会触发浏览器拦截弹窗";

        actions.appendChild(openAllBtn);
        actions.appendChild(collapseBtn);

        head.appendChild(title);
        head.appendChild(actions);
        section.appendChild(head);

        const cards = document.createElement("div");
        cards.className = "cards";

        for (const site of filtered) {
          const a = document.createElement("a");
          a.className = "card";
          a.href = site.url;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.dataset.url = site.url;

          if (compact) {
            a.style.minHeight = "76px";
            a.style.padding = "12px";
          }

          const f = faviconUrl(site.url);

          a.innerHTML = `
            <div class="cardTop">
              <div style="min-width:0; display:flex; flex-direction:column; gap:8px;">
                <div class="row">
                  <img class="favicon" alt="" src="${escapeAttr(f)}" onerror="this.style.display='none'" />
                  <div class="name" title="${escapeAttr(site.name)}">${escapeHtml(site.name)}</div>
                </div>
                <p class="desc">${escapeHtml(site.desc || "")}</p>
              </div>
              <div class="meta" aria-hidden="true">
                <span class="chip ${kindChipClass(group.kind)}">${kindLabel(group.kind)}</span>
              </div>
            </div>
            <div class="meta">
              ${(site.tags || []).slice(0, 6).map(t => `<span class="chip">${escapeHtml(t)}</span>`).join("")}
            </div>
          `;

          cards.appendChild(a);
        }

        section.appendChild(cards);

        // collapsible behavior
        let collapsed = false;
        collapseBtn.addEventListener("click", () => {
          collapsed = !collapsed;
          cards.style.display = collapsed ? "none" : "grid";
        });

        openAllBtn.addEventListener("click", () => {
          for (const s of filtered) window.open(s.url, "_blank", "noopener,noreferrer");
        });

        return { section, matched: filtered.length, total: sites.length, firstUrl: filtered[0]?.url ?? null };
      }

      function render() {
        const query = normalize(q.value);
        app.innerHTML = "";

        let matched = 0;
        let total = 0;
        let firstUrl = null;

        for (const group of SITE_GROUPS) {
          const built = buildSection(group, query);
          app.appendChild(built.section);
          matched += built.matched;
          total += built.total;
          if (!firstUrl && built.firstUrl) firstUrl = built.firstUrl;
        }

        lastRender = { matched, total, firstUrl };
        empty.style.display = matched === 0 ? "block" : "none";
        count.textContent = `共 ${matched} / ${total} 个站点`;
      }

      function openFirstResult() {
        if (lastRender.firstUrl) {
          window.open(lastRender.firstUrl, "_blank", "noopener,noreferrer");
        }
      }

      function escapeHtml(str) {
        return String(str ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }
      function escapeAttr(str) { return escapeHtml(str).replaceAll("\n", " "); }

      // events
      q.addEventListener("input", render);
      toggleCompact.addEventListener("click", () => {
        compact = !compact;
        toggleCompact.setAttribute("aria-pressed", compact ? "true" : "false");
        render();
      });
      openFirst.addEventListener("click", openFirstResult);

      window.addEventListener("keydown", (e) => {
        if (e.key === "/" && document.activeElement !== q) {
          e.preventDefault();
          q.focus();
          q.select();
        }
        if (e.key === "Escape") {
          if (document.activeElement === q || q.value) {
            q.value = "";
            render();
            q.blur();
          }
        }
        if (e.key === "Enter" && document.activeElement === q) {
          e.preventDefault();
          openFirstResult();
        }
      });

      // initial
      render();
    </script>
  </body>
</html>
